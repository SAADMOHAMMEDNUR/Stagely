<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bingo Game | Stagely</title>

  <!-- Bootstrap -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
  />

  <!-- Site styles -->
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    /* Makes the board look clean + consistent */
    .bingo-grid {
      max-width: 900px;
      width: 100%;
    }

    .bingo-cell {
      min-height: 120px;
      width: 100%;
      border: 2px solid #1f1f1f;
      border-radius: 14px;
      background: #fff;
      font-weight: 500;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px;
      line-height: 1.15;
      user-select: none;
      transition: transform 120ms ease, background 120ms ease, color 120ms ease;
    }

    .bingo-cell:hover {
      transform: translateY(-1px);
    }

    .bingo-cell.is-marked {
      background: #212529;
      color: #fff;
      border-color: #212529;
    }

    .bingo-cell.is-free {
      background: #6c757d;
      color: #fff;
      border-color: #6c757d;
      cursor: not-allowed;
    }

    .bingo-cell:focus {
      outline: 3px solid rgba(0,0,0,0.15);
      outline-offset: 2px;
    }

    .win-badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #dee2e6;
      background: #f8f9fa;
      font-weight: 600;
    }
  </style>
</head>

<body>
<header>
  <div class="container">
    <nav class="nav-bar">
      <a href="voting-artists.html">Artists</a>
      <a href="voting-commercials.html">Commercials</a>
      <a href="bingo-settings.html">Make Your Own Bingo</a>
    </nav>

    <div class="text-center">
      <a href="index.html" class="site-title">
        <h1>Stagely</h1>
      </a>
      <h2 class="lead">Super Bowl Bingo</h2>
    </div>
  </div>
</header>

<main class="container my-5">

  <section class="mb-4 text-center">
    <h2>Your Bingo Card</h2>
    <p class="text-muted">Click a square when it happens during the game!</p>
  </section>

  <!-- Controls -->
  <section class="d-flex justify-content-center mb-4">
    <div class="d-flex gap-2 flex-wrap justify-content-center">
      <a href="bingo-settings.html" class="btn btn-outline-dark">Back to Settings</a>
      <button id="clearBtn" class="btn btn-dark" type="button">Clear Marks</button>
    </div>
  </section>

  <!-- Bingo Grid -->
  <section class="d-flex justify-content-center">
    <div class="bingo-grid">
      <div id="bingoBoard" class="row row-cols-5 g-3"></div>
    </div>
  </section>

  <!-- Status Area -->
  <section class="text-center mt-4">
    <p class="fw-bold mb-1">Progress:</p>
    <p id="statusText" class="text-muted mb-0">No bingo yet — keep watching 👀</p>
    <div class="mt-2">
      <span id="markedCount" class="win-badge">Marked: 1/25</span>
    </div>
  </section>

</main>

<footer class="text-center py-4">
  <p>&copy; 2026 Stagely</p>
</footer>

<script>
  // DO NOT CHANGE THESE WORDS TEAM(exact set)
  const CARD_WORDS = [
    "Touchdown",
    "Crowd cheers",
    "Instant replay",
    "Flag on play",
    "Field goal",

    "Celebrity cameo",
    "Car commercial",
    "Slow-motion shot",
    "Mascot appears",
    "Insurance ad",

    "Coach yelling",
    "Halftime teaser",
    "FREE",
    "Drone camera",
    "Timeout",

    "Pop song plays",
    "Fast food ad",
    "Confetti shot",
    "Brand slogan",
    "Laughing fans",

    "Missed tackle",
    "Halftime outfit change",
    "Fireworks",
    "Overtime mention",
    "Winning prediction"
  ];

  const BOARD_SIZE = 25;
  const FREE_INDEX = 12;

  const boardEl = document.getElementById("bingoBoard");
  const statusEl = document.getElementById("statusText");
  const markedCountEl = document.getElementById("markedCount");
  const clearBtn = document.getElementById("clearBtn");

  // marked squares (FREE starts marked)
  let marked = new Set([FREE_INDEX]);

  function renderBoard() {
    boardEl.innerHTML = "";

    for (let i = 0; i < BOARD_SIZE; i++) {
      const col = document.createElement("div");
      col.className = "col d-flex";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "bingo-cell";

      // Put the exact text on the square
      btn.textContent = CARD_WORDS[i];

      // FREE square
      if (i === FREE_INDEX) {
        btn.classList.add("is-free");
        btn.disabled = true;
      }

      // marked state
      if (marked.has(i)) {
        btn.classList.add("is-marked");
      }

      btn.addEventListener("click", () => toggleMark(i));

      col.appendChild(btn);
      boardEl.appendChild(col);
    }

    updateStatus();
  }

  function toggleMark(index) {
    if (index === FREE_INDEX) return;

    if (marked.has(index)) {
      marked.delete(index);
    } else {
      marked.add(index);
    }

    renderBoard();
  }

  function clearMarks() {
    marked = new Set([FREE_INDEX]);
    renderBoard();
  }

  function isBingo() {
    const lines = [];

    // rows
    for (let r = 0; r < 5; r++) {
      lines.push([0,1,2,3,4].map(c => r * 5 + c));
    }
    // cols
    for (let c = 0; c < 5; c++) {
      lines.push([0,1,2,3,4].map(r => r * 5 + c));
    }
    // diagonals
    lines.push([0, 6, 12, 18, 24]);
    lines.push([4, 8, 12, 16, 20]);

    return lines.some(line => line.every(i => marked.has(i)));
  }

  function updateStatus() {
    const count = marked.size;
    markedCountEl.textContent = `Marked: ${count}/25`;

    if (isBingo()) {
      statusEl.classList.remove("text-muted");
      statusEl.classList.add("fw-bold");
      statusEl.textContent = "BINGO! 🎉 You got it!";
    } else {
      statusEl.classList.add("text-muted");
      statusEl.classList.remove("fw-bold");
      statusEl.textContent = "No bingo yet — keep watching 👀";
    }
  }

  clearBtn.addEventListener("click", clearMarks);

  // boot
  renderBoard();
</script>
</body>
</html>
