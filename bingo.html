<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Bingo Game | Stagely</title>

  <!-- Bootstrap -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

  <!-- Site styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <div class="container">
    <nav class="nav-bar">
      <a href="index.html">Home</a>
      <a href="voting-artists.html">Artists</a>
      <a href="voting-commercials.html">Commercials</a>
      <a href="bingo.html">Make Your Own Bingo</a>
    </nav>

    <div class="text-center">
      <a href="index.html" class="site-title">
        <h1>Stagely</h1>
      </a>
      <h2 class="lead">Super Bowl Bingo</h2>
    </div>
  </div>
</header>

<main class="container my-5">

  <section class="mb-4 text-center">
    <h2>Your Bingo Card</h2>
    <p class="text-muted">
      Click a square when it happens during the game!
    </p>
  </section>

  <!-- Bingo Grid -->
  <section class="d-flex justify-content-center">
    <div class="bingo-board">

      <div class="row row-cols-5 g-2 text-center">

        <!-- Row 1 -->
        <button class="btn btn-outline-dark">Touchdown</button>
        <button class="btn btn-outline-dark">Crowd cheers</button>
        <button class="btn btn-outline-dark">Instant replay</button>
        <button class="btn btn-outline-dark">Flag on play</button>
        <button class="btn btn-outline-dark">Field goal</button>

        <!-- Row 2 -->
        <button class="btn btn-outline-dark">Celebrity cameo</button>
        <button class="btn btn-outline-dark">Car commercial</button>
        <button class="btn btn-outline-dark">Slow-motion shot</button>
        <button class="btn btn-outline-dark">Mascot appears</button>
        <button class="btn btn-outline-dark">Insurance ad</button>

        <!-- Row 3 -->
        <button class="btn btn-outline-dark">Coach yelling</button>
        <button class="btn btn-outline-dark">Halftime teaser</button>

        <!-- FREE SPACE -->
        <button class="btn btn-dark disabled">FREE</button>

        <button class="btn btn-outline-dark">Drone camera</button>
        <button class="btn btn-outline-dark">Timeout</button>

        <!-- Row 4 -->
        <button class="btn btn-outline-dark">Pop song plays</button>
        <button class="btn btn-outline-dark">Fast food ad</button>
        <button class="btn btn-outline-dark">Confetti shot</button>
        <button class="btn btn-outline-dark">Brand slogan</button>
        <button class="btn btn-outline-dark">Laughing fans</button>

        <!-- Row 5 -->
        <button class="btn btn-outline-dark">Missed tackle</button>
        <button class="btn btn-outline-dark">Halftime outfit change</button>
        <button class="btn btn-outline-dark">Fireworks</button>
        <button class="btn btn-outline-dark">Overtime mention</button>
        <button class="btn btn-outline-dark">Winning prediction</button>

      </div>
    </div>
  </section>

  <!-- Status Area -->
  <section class="text-center mt-4">
    <p class="fw-bold">Progress:</p>
    <p class="text-muted">No bingo yet — keep watching 👀</p>
  </section>

</main>

<footer class="text-center py-4">
  <p>&copy; 2026 Stagely</p>
</footer>

</body>
</html>
